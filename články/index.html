---
layout: default
title: Aktuality a články
ref: Articles
lang: cs
---
   <gov-container>
    <gov-tiles columns="3" no-border>
        {% assign clanky=site.clanky | where:"lang", page.lang | reverse %}
        {% for clanek in clanky %}
        <gov-tile href="..{{ clanek.url }}">
            <h2 slot="title">{{ clanek.title }}</h2>
            {% if clanek.image %}
            <p style="margin-top: 0; margin-bottom: 5px;">
                <img width="100%" src="{{ clanek.image }}" alt="{{ clanek.title }}"/>
            </p>
            {% endif %}
            <gov-chip variant="secondary" size="xs" tag="span" inverse="true">
                <gov-icon type="complex" name="time" slot="left-icon"></gov-icon>
                {{ clanek.date | date: "%-d. %-m. %Y" }}
            </gov-chip>
            {{ clanek.excerpt }}
        </gov-tile>
        {% endfor %}
    </gov-tiles>
</gov-container>
